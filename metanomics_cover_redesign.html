<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Metanomics — Redesigned Cover</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; display: flex; justify-content: center; align-items: flex-start; padding: 24px; min-height: 100vh; }
  svg { display: block; max-width: 100%; height: auto; }
</style>
</head>
<body>
<svg width="2000" height="1400" viewBox="0 0 2000 1400"
     xmlns="http://www.w3.org/2000/svg">
<defs>

  <!-- Gradients -->
  <radialGradient id="gFront" cx="50%" cy="38%" r="68%" gradientUnits="objectBoundingBox">

    <stop offset="42%" stop-color="#0e52a0"/>
    <stop offset="100%" stop-color="#040c1e"/>

  <radialGradient id="gBack" cx="38%" cy="48%" r="72%" gradientUnits="objectBoundingBox">
    <stop offset="0%"  stop-color="#2270b8"/>
    <stop offset="100%" stop-color="#091e40"/>

  <radialGradient id="gGoldGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%"  stop-color="#f5c018" stop-opacity="0.38"/>
    <stop offset="100%" stop-color="#f5c018" stop-opacity="0"/>
  </radialGradient>

  <radialGradient id="gBlueGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%"  stop-color="#50b0ff" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#50b0ff" stop-opacity="0"/>
  </radialGradient>

  <!-- Filters -->
  <filter id="f3" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="f6" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b"/>

  </filter>
  <filter id="fb6">
    <feGaussianBlur stdDeviation="6"/>
  </filter>
  <filter id="fb10">
    <feGaussianBlur stdDeviation="10"/>
  </filter>
  <filter id="fb16">
    <feGaussianBlur stdDeviation="16"/>
  </filter>

  <!-- Clip regions -->
  <clipPath id="cFront">
    <rect x="1020" y="0" width="980" height="1400"/>
  </clipPath>
  <clipPath id="cSpine">
    <rect x="930" y="0" width="90" height="1400"/>
  </clipPath>
  <clipPath id="cBack">
    <rect x="0" y="0" width="930" height="1400"/>
  </clipPath>

</defs>


<!-- ═══════════════════════════════════════════════════════════════ -->
<!--  FRONT COVER  (x: 1020–2000)                                   -->

  <ellipse cx="1485" cy="728" rx="390" ry="368" fill="none" stroke="#3888c8" stroke-width="1" opacity="0.10"/>

  <!-- 5. SACRED GEOMETRY — Metatron's Cube in gold ─────────────────── -->
  <!--
       Center: (1510, 650)
       Flower-of-life r = 82  → inner petals at distance 82 from center
       Centers of 6 petals:
         Top:        (1510, 568)
         UR:         (1581, 609)

         Bottom:     (1510, 732)

  -->

  <!-- Soft golden area glow -->

    <circle cx="1652" cy="568" r="82"/>
    <circle cx="1652" cy="732" r="82"/>
    <circle cx="1510" cy="814" r="82"/>
    <circle cx="1368" cy="732" r="82"/>

  </g>

  <!-- Star of David (two triangles through the 6 inner petal centers) -->
  <polygon points="1510,568 1581,691 1439,691"
           fill="none" stroke="#f5c018" stroke-width="1.8" opacity="0.58"/>
  <polygon points="1510,732 1581,609 1439,609"
           fill="none" stroke="#f5c018" stroke-width="1.8" opacity="0.58"/>

  <!-- All 6 spokes from center -->
  <g stroke="#f5c018" stroke-width="1.2" opacity="0.42">
    <line x1="1510" y1="650" x2="1510" y2="568"/>
    <line x1="1510" y1="650" x2="1581" y2="609"/>
    <line x1="1510" y1="650" x2="1581" y2="691"/>
    <line x1="1510" y1="650" x2="1510" y2="732"/>
    <line x1="1510" y1="650" x2="1439" y2="691"/>
    <line x1="1510" y1="650" x2="1439" y2="609"/>
  </g>

  <!-- Cross-connections between petal centers (completes Metatron cube) -->
  <g stroke="#f5c018" stroke-width="0.9" opacity="0.30">
    <!-- Outer hexagon -->
    <line x1="1510" y1="568" x2="1581" y2="609"/>
    <line x1="1581" y1="609" x2="1581" y2="691"/>
    <line x1="1581" y1="691" x2="1510" y2="732"/>
    <line x1="1510" y1="732" x2="1439" y2="691"/>
    <line x1="1439" y1="691" x2="1439" y2="609"/>
    <line x1="1439" y1="609" x2="1510" y2="568"/>
    <!-- Long diagonals -->
    <line x1="1510" y1="568" x2="1581" y2="691"/>
    <line x1="1510" y1="568" x2="1439" y2="691"/>
    <line x1="1581" y1="609" x2="1439" y2="609"/>
    <line x1="1581" y1="609" x2="1510" y2="732"/>
    <line x1="1581" y1="609" x2="1439" y2="691"/>
    <line x1="1581" y1="691" x2="1439" y2="609"/>
    <line x1="1581" y1="691" x2="1439" y2="691"/>
    <line x1="1581" y1="691" x2="1510" y2="732"/>
    <line x1="1510" y1="732" x2="1439" y2="609"/>
  </g>

  <!-- Glowing nodes at each petal center — like AUL's chakra stars -->
  <!-- Blurred halos -->
  <g filter="url(#fb6)" opacity="0.55">

    <circle cx="1510" cy="568" r="13" fill="#f8d040"/>
    <circle cx="1581" cy="609" r="13" fill="#f8d040"/>
    <circle cx="1581" cy="691" r="13" fill="#f8d040"/>
    <circle cx="1510" cy="732" r="13" fill="#f8d040"/>
    <circle cx="1439" cy="691" r="13" fill="#f8d040"/>

  <!-- 6. MOUNTAINS at bottom ───────────────────────────────────────── -->
  <!-- Dark back layer -->
  <path d="
    M 1020,1400 L 1020,1045
    C 1065,1022 1108,1008 1155,1014
    C 1202,1020 1242,1042 1275,1030
    C 1308,1018 1338,990  1382,980

    C 1546,990  1568,968  1608,958

    C 1756,994  1782,1022 1820,1035
    C 1858,1048 1898,1041 1938,1022
    C 1965,1008 1985,990  2000,982

  <!-- Mid layer, lighter teal -->

    M 1020,1400 L 1020,1128

  <!-- 7. TYPOGRAPHY ────────────────────────────────────────────────── -->

  <!-- METANOMICS — massive bold white title (Impact = AUL style) -->
  <text x="1510" y="134"
        text-anchor="middle"
        font-family="Impact,'Arial Narrow',Arial,sans-serif"
        font-size="162"
        font-weight="900"
        fill="white"
        letter-spacing="-4"
        filter="url(#f3)">METANOMICS</text>

  <!-- Gold rule lines under title — matches AUL's underline treatment -->
  <rect x="1082" y="148" width="856" height="4"  fill="#f5c018" opacity="0.85"/>
  <rect x="1082" y="156" width="856" height="2"  fill="#f5c018" opacity="0.50"/>

  <!-- Subtitle -->
  <text x="1510" y="198"
        text-anchor="middle"
        font-family="Impact,'Arial Narrow',Arial,sans-serif"
        font-size="36"
        fill="#f5c018"
        letter-spacing="2">REVERSE ENGINEERING THE ECONOMY OF ZION</text>

  <!-- Author name at bottom -->
  <text x="1510" y="1368"
        text-anchor="middle"
        font-family="Impact,'Arial Narrow',Arial,sans-serif"
        font-size="86"
        font-weight="900"
        fill="#f5c018"
        letter-spacing="3"
        filter="url(#f3)">TREVOR JARED SPENCER</text>

</g>


<!-- ═══════════════════════════════════════════════════════════════ -->
<!--  SPINE  (x: 930–1020)                                          -->

<g clip-path="url(#cSpine)">
  <rect x="930" y="0" width="90" height="1400" fill="#050c1c"/>
  <!-- Slight blue tint -->
  <rect x="930" y="0" width="90" height="1400" fill="#1055a0" opacity="0.40"/>

        text-anchor="middle"
        font-family="Impact,'Arial Narrow',Arial,sans-serif"

  <!-- Spine author -->
  <text transform="translate(975,345) rotate(-90)"
        text-anchor="middle"

        font-size="19"
        fill="white"

</g>

<!--  BACK COVER  (x: 0–930)                                        -->

<g clip-path="url(#cBack)">

  <!-- Background -->

  <!-- Subtle color block echo — top-right lighter wedge -->

  <!-- Back mountains — dark layer -->

    C 262,1112 292,1078 332,1068
    C 364,1060 394,1068 418,1081
    C 435,1090 446,1098 460,1090

    C 530,1052 550,1058 570,1066
    C 596,1078 616,1096 648,1086

    C 792,1030 836,1045 872,1060

  <!-- Back cover body text — line by line SVG text -->
  <!-- Para 1: large intro (white, slightly italic feel) -->
  <text x="465" y="82" text-anchor="middle"
        font-family="Impact,'Arial Narrow',Arial,sans-serif"
        font-size="28" fill="white" opacity="0.95">Metanomics is an inspired examination of the restoration of the</text>
  <text x="465" y="114" text-anchor="middle"
        font-family="Impact,'Arial Narrow',Arial,sans-serif"
        font-size="28" fill="white" opacity="0.95">biblically prophesied New Jerusalem from an economic perspective.</text>

  <!-- Divider -->
  <rect x="60" y="126" width="810" height="2" fill="#f5c018" opacity="0.45"/>

  <!-- Para 2 — gold, smaller -->
  <text x="465" y="162" text-anchor="middle"
        font-family="Impact,'Arial Narrow',Arial,sans-serif"
        font-size="24" fill="#f5c018">The Lord has returned to His earthly tabernacle, together with Enoch</text>
  <text x="465" y="190" text-anchor="middle"
        font-family="Impact,'Arial Narrow',Arial,sans-serif"
        font-size="24" fill="#f5c018">and the hosts of the heavenly city. They now direct this sacred work</text>
  <text x="465" y="218" text-anchor="middle"
        font-family="Impact,'Arial Narrow',Arial,sans-serif"
        font-size="24" fill="#f5c018">to outwardly manifest the Kingdom of God on the earth in our day.</text>
  <text x="465" y="246" text-anchor="middle"
        font-family="Impact,'Arial Narrow',Arial,sans-serif"
        font-size="24" fill="#f5c018">The Millennium has begun, and humanity is progressing from the</text>
  <text x="465" y="274" text-anchor="middle"
        font-family="Impact,'Arial Narrow',Arial,sans-serif"
        font-size="24" fill="#f5c018">terrestrial toward the celestial during this Messianic Age.</text>

  <!-- Para 3 — gold -->
  <text x="465" y="322" text-anchor="middle"
        font-family="Impact,'Arial Narrow',Arial,sans-serif"
        font-size="24" fill="#f5c018">A central requirement of this new era is the restoration of the economy</text>
